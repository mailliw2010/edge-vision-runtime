source:
  # ZLM 集成示例：runtime-worker 实际连接 ZLM 暴露的 RTSP outlet，
  # upstream_endpoint 保留摄像头原始地址，便于编排、审计和排障。
  session_id: camera-0
  source_uri: rtsp://127.0.0.1:8554/live/camera-0
  upstream_kind: zlm-proxy
  upstream_endpoint: rtsp://camera-host/live/camera-0
  transport_protocol: rtsp
  buffer_transport: host-memory
  proto_version: v1
  decode_mode: gstreamer-nv12-host
  pixel_format: nv12
  decode_timeout_seconds: 60
  decode_log_path: /tmp/evr_runtime_worker_source_ffmpeg.log

worker:
  session_id: worker-camera-0
  supervisor_endpoint: unix:///tmp/evr-supervisor.sock
  source_session_id: camera-0
  proto_version: v1
  inference_backend: tensorrt
  engine_path: models/yolov8s.onnx
  algorithm_name: yolov8-person-detection
  algorithm_package_uri: algorithm/yolov8_person_detection
  algorithm_entry_point: evr::algorithm::yolov8_person_detection::YoloV8PersonDetector
  algorithm_runtime_config_uri: algorithm/yolov8_person_detection/configs/yolov8_person_detection.v1.example.yaml
  input_binding: frames
  result_encoding: json
  output_topic: events.detection

observability:
  enabled: false
  socket_path: /run/edge-vision/observe/runtime.sock
  preview_dir: /run/edge-vision/observe/previews
