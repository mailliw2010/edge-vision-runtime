deployment:
  deployment_id: phase1-demo

supervisor:
  session_id: supervisor-main
  proto_version: v1
  control_endpoint: unix:///tmp/evr-supervisor.sock

source:
  session_id: source-demo
  source_uri: rtsp://127.0.0.1:8554/live/camera-0
  upstream_kind: zlm-proxy
  upstream_endpoint: rtsp://127.0.0.1:554/camera-0
  transport_protocol: rtsp
  buffer_transport: nvmm
  proto_version: v1
  decode_mode: jetson-nvdec
  pixel_format: nv12

worker:
  session_id: worker-0
  supervisor_endpoint: unix:///tmp/evr-supervisor.sock
  source_session_id: source-demo
  proto_version: v1
  inference_backend: tensorrt
  engine_path: models/detector.plan
  algorithm_name: detector
  input_binding: frames
  result_encoding: json
  output_topic: events.detection
